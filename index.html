<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Acesso CMR</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: sans-serif; background: #003d99; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Acesso CMR</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="entrar()">Acessar</button>
    </div>
    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyZY7iMrsw5oL7wstMJGoZ-uWI7zZa9uxMLYtvgInlh0RyXbT2bCXPPmGmHSDmRcFhZ/exec";

        function entrar() {
            let u = document.getElementById('user').value, p = document.getElementById('pass').value;
            fetch(URL_SCRIPT, {
                method: "POST",
                body: JSON.stringify({ action: "login", user: u, pass: p })
            })
            .then(res => res.json())
            .then(res => {
                if(res) { document.open(); document.write(res); document.close(); }
                else Swal.fire('Erro', 'Usuário ou senha incorretos!', 'error');
            })
            .catch(e => Swal.fire('Erro técnico', 'Verifique a conexão.', 'error'));
        }
    </script>
</body>
</html>
